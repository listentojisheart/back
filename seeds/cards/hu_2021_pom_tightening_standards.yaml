# ------------------ Executable Summary (Six-Item Closed Loop v1.2) ------------------

executable_summary:
  version: "v1.2 (cross-path generalized)"
  three_repeatable_moves:
    - id: "EM1_v2_analytic_unit_invention"
      essence: "把文献里模糊的分析单元替换为自己定义的可直接入 model 的单位"
      cross_path_robust: true
      failure_mode: "沿用文献单位致测量与 model 错位"
    - id: "EM2_v2_identification_with_dual_defense"
      essence: "方法章节专段逐元素 map 识别来源，每个强假设同挂 precedent + empirical testability"
      cross_path_robust: true
      failure_mode: "只挂一条腿→reviewer 攻击另一条"
    - id: "EM3_v2_independent_mechanism_validation"
      essence: "主效应之外必有独立证据段证明非 artifact；形态由 method path 决定，存在必须"
      cross_path_robust: true
      form_branches:
        structural: "ecological narrative triangulation"
        causal_inference: "alternative-explanation statistical exclusion"
      failure_mode: "无独立 validation→reviewer 把显著 coefficient 读成 sampling artifact"
  two_mimicable_decisions:
    - id: "ED1_v2_data_generation_mechanism"
      essence: "评估数据看生成机制独特性（系统结构 / 监管周期 / 多源链接），不看稀缺性或规模"
      cross_path_robust: true
    - id: "ED2_v2_narrative_budget_to_counterintuitive"
      essence: "叙事资源向反直觉度最高的证据块集中；不是主效应必降也不是必升"
      cross_path_robust: true
      decision_rule: "先做反直觉度排序，再分配段落长度"
  one_failure_mode:
    - id: "EF1_v2_quantification_engine_absent"
      essence: "没有一条可独立复核的从系数到社会量级的路径"
      cross_path_robust: true
      acceptable_forms:
        - "counterfactual scenarios (Retrials)"
        - "multiplicative magnitude chain with footnote formulas (Tightening)"
      failure_judge: "Discussion/Conclusion 只有定性 implication 无系数×规模推导"
  closed_loop_note: |
    六件套 v1.2 闭环（跨路径通用版）:
    EM1 给测量单位 →
    EM2 让单位与识别咬合 →
    EM3 让 effect 非 artifact →
    ED1 保证地基承重 →
    ED2 保证承重的是 novelty →
    EF1 保证 novelty 能被读者带出论文外用
    任一环缺失诱发后续环权重坍缩。

