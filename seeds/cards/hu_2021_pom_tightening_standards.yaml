phase_3_method_alignment:
  primary_method: "Regression Discontinuity (RD)"
  method_novelty_in_OM: "flagged (Ho 2017 + Terwiesch 2019 cited for OM-suitability)"
  identification_structure: "explicit_three_element_checklist"
  identification_elements:
    - "assignment_variable (V_ij = avg emissions prior to next standard announcement)"
    - "threshold (L_j+1 = upcoming standard limit)"
    - "outcome_variable (MP_ij = probability of overshooting)"
  core_assumption: "imprecise_control_over_assignment_variable"
  assumption_defense_style: "dual_defense"
  assumption_defense_layers:
    precedent:
      - "Lee 2008 (vote share)"
      - "Chiang 2009 (school assessment)"
      - "Buettner 2006 (implicit marginal tax)"
      - "Card et al. 2008 (reverse-RD tipping point)"
      - "Matsudaira 2008 (test score)"
    empirical_test:
      - "McCrary 2008 density test"
      - "Lee-Lemieux 2010 covariate continuity test"
  theory_scaffold: "regulation_compliance_theory (Miller et al. 2020, three forces)"
  moderators_structure: "single_force_gradient (both H2/H3 amplify economic force)"
  linear_regression_choice_defense: "parametric linear cited from Hahn 2001 / Porter 2003 / Lee-Lemieux 2010"
  methodology_pedagogy: "Appendix A = full RDD step-by-step tutorial"

phase_4_exploratory_depth:
  heterogeneity_dimensions: 2
  heterogeneity_baked_in_via: "hypothesis_structure (H2/H3 interaction terms)"
  main_effect_role: "elevated (counterintuitive finding = its own novelty)"
  mechanism_validation_style: "alternative_explanation_statistical_exclusion"
  mechanism_validation_artifact: "Tables A8-A10 show treated group boosts emissions beyond pre-treatment level (excludes regression-to-mean)"
  goodness_of_fit_check: "R-squared only (0.386-0.419); no OOS CV (RDD convention)"
  robustness_check_classes: 4
  robustness_check_list:
    - "locality parameter h ∈ [0.1, 1.0] step 0.1 (Tables A3-A4)"
    - "alternative assignment variable specification (Table A5)"
    - "polynomial order via AIC (Table A6)"
    - "donut hole RD (Table A7)"
  counterfactual_scenarios: 0
  quantification_engine_type: "multiplicative_magnitude_chain"
