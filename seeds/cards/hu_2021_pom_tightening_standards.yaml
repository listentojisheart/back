    - "3.4% treatment effect"
    - "× 284M EU vehicles = 9.7M excess non-compliant"
    - "× 84.7% overshooting prior level = 8.2M"
    - "× 442 gal fuel × 3.79 kg/gal × 0.32 g/kg = 4.40 kilotons extra NOx"
  quantification_reproducibility: "footnotes 14 and 17 provide full formulas"
  quantified_numbers_count: 6

