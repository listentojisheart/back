# ------------------ Executable Summary v1.4 (Three-Layer Architecture) ------------------

executable_summary:
  version: "v1.4 (three_layer_architecture)"
  architecture: |
    Three layers per pattern:
    1. Hu_signature layer (existence) — all Hu papers regardless of position
    2. first_author_signature path_agnostic layer (uniform execution when Hu leads)
    3. first_author_signature path_capped layer (method_path ceiling limits execution strength)
  
  three_repeatable_moves:
    - id: "EM1_v4_analytic_structure_invention"
      existence_layer: "Hu_signature (every paper has analytic structure)"
      analytic_naming_sublayer: "first_author_signature path_capped (structural>causal>ml)"
      policy_naming_sublayer: "first_author_signature path_agnostic (always present when leading)"
      failure_mode: "沿用文献模糊单位致测量与 model 错位"
      
    - id: "EM2_v3_identification_with_dual_defense"
      existence_layer: "Hu_signature ROBUST highest confidence"
      form_branches_by_path: [structural, RDD, DID_dPSM, ml] # all verified
      failure_mode: "只挂 precedent 或只挂 testability — reviewer 攻缺失那条"
      
    - id: "EM3_v3_independent_mechanism_validation"
      existence_layer: "Hu_signature ROBUST"
      form_branches_by_path: [structural, causal_inference, ml] # all verified
      failure_mode: "无独立 validation → main effect 被读成 artifact"
  
  two_mimicable_decisions:
    - id: "ED1_v3_data_generation_mechanism"
      existence_layer: "Hu_signature (mechanism in place)"
      purity_layer: "first_author_signature path_agnostic (no scarcity admission when leading)"
      decision_rule_leading: "数据 = 生成机制独特性，禁止 scarcity admission"
      decision_rule_coauthor: "generation mechanism 在位，scarcity 可共存"
      
    - id: "ED2_v3_narrative_budget_to_counterintuitive"
      existence_layer: "weak (may be absent in non-lead)"
      strength_layer: "first_author_signature path_agnostic (with path-specific form)"
      decision_rule: "写作前反直觉度排序分配段落长度"
      form_branches: 3 # structural_demoted, causal_elevated, ml_theory_revision_call
  
  one_failure_mode:
    - id: "EF1_v4_quantification_engine"
      existence_layer_hu_signature: "必有某种从点估计向外的定量解释"
      strength_layer_first_author_path_capped: "四级 Tier"
      tier_classification:
        GOLD: "chain OR counterfactual simulation (structural/causal enabled)"
        GOLD_MEDIUM: "coefficient_to_actionable_value_mapping_matrix (ml path ceiling)"
        PASS: "point_estimate + CI only (non-lead acceptable)"
        FAIL: "无定量外推"
      hard_fail: "Tier_FAIL → R3 坍塌"
      soft_fail: "1st_author paper 停在 Tier_PASS → 未达首作标准"
      decision_rule: "首作论文必 ≥ Tier_GOLD_MEDIUM; method_path 允许时追求 GOLD"
  
  closed_loop_v1_4: |
    Hu_signature spine (existence, cross-position):
      EM1 analytic structure → EM2 identification+dual defense → EM3 independent validation →
      ED1 mechanism in place → [ED2 weak at existence] → EF1 some quantification
    
    first_author_path_agnostic (uniform when leading):
      EM1 policy_prescription_naming
      ED1 purity (no scarcity)
      ED2 counterintuitive narrative concentration
      A4 preempt ≥55% coverage
      B2 contribution count=3
      EF1 ≥ Tier_GOLD_MEDIUM
    
    first_author_path_capped (method ceiling limits peak execution):
      EM1 analytic_unit naming (structural>causal>ml)
      EF1 GOLD vs GOLD_MEDIUM (structural/causal>ml)

