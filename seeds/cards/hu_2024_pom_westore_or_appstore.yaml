# ------------------ Executable Summary v1.5 ------------------

executable_summary:
  version: "v1.5 (three-factor × three-layer EM1 + path_capped precision + Hu_core_rule)"
  architecture: |
    Three persistence layers per pattern:
    1. Hu_signature layer (existence)
    2. first_author_signature path_agnostic layer (uniform execution)
    3. first_author_signature path_capped layer (method architecture ceiling)
    
    PLUS Hu_core_rule (single_main_method_plus_alternatives) above all

  three_repeatable_moves:
    - id: "EM1_v5_analytic_structure_three_factor_three_layer"
      existence: "Hu_signature — every paper has analytic structure"
      naming_three_factor_model:
        topic_novelty: "naming when introducing new research area"
        measurement_need: "naming when inventing aggregation unit"
        existing_theory_reuse: "naming suppressed when borrowing existing framework"
      naming_three_layer_location:
        title_layer: "coined word or portmanteau in title"
        analytic_layer: "twin pair or named analytic unit in body"
        policy_layer: "original policy_prescription naming (first_author_path_agnostic)"
      failure_mode: "沿用文献模糊单位致测量与 model 错位"
      
    - id: "EM2_v3_identification_with_dual_defense"
      persistence: "Hu_signature ROBUST highest confidence"
      form_branches_full: [structural, RDD, DID_dPSM, ml]
      failure_mode: "只挂 precedent 或只挂 testability — reviewer 攻缺失那条"
      
    - id: "EM3_v3_independent_mechanism_validation"
      persistence: "Hu_signature ROBUST"
      form_branches_full: [structural_with_GoF_CV, causal_with_statistical_exclusion, ml_with_multi_layer_consistency]
      failure_mode: "无独立 validation → main effect 被读成 artifact"

  two_mimicable_decisions:
    - id: "ED1_v4_generation_mechanism_double_dimension"
      existence: "Hu_signature (mechanism in place)"
      purity: "first_author_path_agnostic (no scarcity admission when leading)"
      double_dimension:
        data_source_mechanism: "how data is generated"
        analytic_angle_mechanism: "how researcher generates unique view"
      public_data_compatible: "proven by WeStore"
      decision_rule_leading: "evaluate both dimensions; no scarcity admission"
      
    - id: "ED2_v3_narrative_budget_to_counterintuitive"
      strength_layer: "first_author_path_agnostic"
      form_branches_4: true
      decision_rule: "sort counterintuitive rank before writing → allocate paragraphs"
  
  one_failure_mode:
    - id: "EF1_v4_quantification_engine_path_capped"
      existence: "Hu_signature"
      strength_tier_by_path:
        structural: "GOLD STANDARD (counterfactual simulation, 2/2 first-author)"
        causal_1st: "GOLD achievable (chain or simulation)"
        causal_non_lead: "PASS default"
        ml: "GOLD_MEDIUM ceiling (coefficient-to-value mapping)"
      hard_fail: "Tier_FAIL → R3 collapses"
      soft_fail: "1st-author stops at PASS → below first-author standard"
  
  closed_loop_v1_5: |
    Hu_signature spine (cross-position existence):
      EM1 analytic structure → EM2 identification+dual → EM3 independent validation →
      ED1 generation mechanism (double dimension) → [ED2 weak in non-lead] → EF1 some quantification
    
    first_author_path_agnostic (uniform when leading):
      EM1 policy_layer_naming (4/4)
      ED1 purity (no scarcity)
      ED2 counterintuitive concentration
      A4 preempt ≥55% coverage
      B2 count=3 explicit numbering
      EF1 ≥ Tier PASS
    
    first_author_path_capped (method ceiling):
      EM1 analytic_layer naming (three-factor model, not path only)
      EF1 strength tier (structural/causal GOLD → standard; ml GOLD-MEDIUM ceiling)
    
    Hu_core_rule (above all, 5/5 no exception):
      single_main_method + alternatives_as_support

